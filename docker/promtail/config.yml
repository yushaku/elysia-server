server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container
      - source_labels: [__meta_docker_container_name]
        regex: '/(.+)'
        target_label: container
        replacement: '$1'
      - source_labels: [__meta_docker_container_image]
        target_label: image
    pipeline_stages:
      - json:
          expressions:
            level: level
            time: time
            msg: message
            requestId: requestId
            event: event
      - labels:
          level:
          event:
          requestId:

